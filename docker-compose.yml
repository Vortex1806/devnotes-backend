services:
  mongo-server:
    image: mongo:latest
    networks: 
      - devnotes-net
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  devnotes-backend:
    build: .
    ports:
      - 5000:5000
    environment:
      - MONGO_URI=mongodb://mongo-server:27017
    networks: 
      - devnotes-net
    depends_on: 
      mongo-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 30s

networks:
  devnotes-net:
volumes:
  mongo-data:
